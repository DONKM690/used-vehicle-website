<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WheelX | Sign Up</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>


    <header class="navbar">
        <h1 class="logo">Wheel<span>X</span></h1>

        <!-- Menu Toggle (Mobile) -->
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>

        <nav class="nav-links">
            <a href="index.html" class="btn">Home</a>
            <a href="newcars.html" class="btn">New Cars</a>
            <a href="sell.html" class="btn">Sell</a>
            <a href="showroom.html" class="btn">Showrooms</a>
            <a href="about.html" class="btn">About</a>
            <a href="contact.html" class="btn">Contact</a>

        </nav>
    </header>



    <section class="signup-container">
        <div class="signup-box">
            <h2>Create Account</h2>

            <form id="signupForm">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>

                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>

                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="Confirm password" required>

                <button type="submit">Sign Up</button>

                <p>Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </form>
        </div>
    </section>

    <script>
        document.getElementById("signupForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;

            if (password !== confirm) {
                alert("Passwords do not match!");
                return;
            }

            const user = {
                username: username,
                email: email,
                password: password
            };

            localStorage.setItem("user", JSON.stringify(user));
            alert("Sign up successful!");
            window.location.href = "login.html";
        });
    </script>


    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-section">
                <h3 class="logos">Wheel<span>X</span></h3>
                <p>Your trusted used vehicles marketplace.</p>
                <p class="follow">FOLLOW US</p>
                <div class="social-icons">
                    <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
                </div>

            </div>

            <div class="footer-section"> </div>

            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: donkm555@gmail.com</p><br>
                <p>Phone: +91 7559890610</p>
            </div>
        </div>

        <div class="footer-bottom">
            <p>© 2026 WheelX. All Rights Reserved.</p>
        </div>
    </footer>

</body>

</html>
