        const brand = params.get("brand") || "";

                fuel: "Petrol",
                mileage: "30 km/l",

                owner: "First Owner",
                location: "Kerala",
                info: "Petrol • 2021 • 5,000 km",

            },
            {

            {
                name: "Kawasaki Ninja 400",
                price: "600000",
                year: "2021",
                fuel: "Petrol",
                mileage: "25 km/l",
                transmission: "Manual",
                owner: "First Owner",
                location: "Kerala",
                info: "Petrol • 2021 • 3,000 km",
                img: "https://cdn.bikedekho.com/processedimages/kawasaki/ninja-400/640X309/ninja-40062b2b760470d9.jpg?imwidth=412&impolicy=resize"
            }


        ];


        const filtered = vehicles.filter(v =>
            v.name.toLowerCase().includes(brand.toLowerCase())
        );

        const container = document.getElementById("resultsContainer");


        if (filtered.length === 0) {
            container.innerHTML = `<p class="no-result">No vehicles found</p>`;
        }


        filtered.forEach(v => {
            container.innerHTML += `
        <div class="card">
            <img src="${v.img}" alt="${v.name}">
            <h3>${v.name}</h3>
            <p>${v.info}</p>
            <button onclick="viewDetails(
                '${v.name}',
                '${v.price}',
                '${v.year}',
                '${v.fuel}',
                '${v.mileage}',
                '${v.transmission}',
                '${v.owner}',
                '${v.location}',
                '${v.img}'
            )">View Details</button>
        </div>
    `;
        });

        function viewDetails(name, price, year, fuel, mileage, transmission, owner, location, image) {
            const car = {
                name,
                price,
                year,
                fuel,
                mileage,
                transmission,
                owner,
                location,
                image
            };

            localStorage.setItem("selectedCar", JSON.stringify(car));
            window.location.href = "details.html";
        }
    </script>
