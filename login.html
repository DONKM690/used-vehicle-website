<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WheelX | Login</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <h1 class="logo">Wheel<span>X</span></h1>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>

        <nav class="nav-links">
            <a href="index.html" class="btn">Home</a>
            <a href="newcars.html" class="btn">New Cars</a>
            <a href="sell.html" class="btn">Sell</a>
            <a href="showroom.html" class="btn">Showrooms</a>
            <a href="about.html" class="btn">About</a>
            <a href="contact.html" class="btn">Contact</a>
        </nav>
    </header>

    <!-- Login Section -->
    <section class="login-container">
        <div class="login-box">
            <h2>Login to WheelX</h2>

            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>

                <p>Don’t have an account?
                    <a href="signup.html">Sign Up</a>
                </p>
            </form>
        </div>
    </section>

    <!-- Login Script -->
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            const storedUser = JSON.parse(localStorage.getItem("user"));

            if (!storedUser) {
                alert("⚠️ No user found. Please sign up first.");
                return;
            }

            if (email === storedUser.email && password === storedUser.password) {

            
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("loggedInEmail", email);

                alert("✅ Login successful!");

                
                const redirectPage = localStorage.getItem("redirectAfterLogin") || "index.html";
                localStorage.removeItem("redirectAfterLogin");
                window.location.href = "index.html";

            } else {
                alert("❌ Invalid email or password");
            }
        });
    </script>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">

            <div class="footer-section">
                <h3 class="logos">Wheel<span>X</span></h3>
                <p>Your trusted used vehicles marketplace.</p>
                <p class="follow">FOLLOW US</p>
                <div class="social-icons">
                    <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
                </div>
            </div>

            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: donkm555@gmail.com</p><br>
                <p>Phone: +91 7559890610</p>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 WheelX. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
